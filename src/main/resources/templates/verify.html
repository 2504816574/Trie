<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trie 扫描匹配结果验证</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6fa; color: #333; line-height: 1.6; }
        .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: #2d3436; margin-bottom: 4px; font-size: 24px; }
        .subtitle { text-align: center; color: #636e72; margin-bottom: 24px; font-size: 13px; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 20px; background: #fff; border-radius: 10px; padding: 14px 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .toolbar label { font-size: 13px; font-weight: 600; color: #555; }
        .toolbar select, .toolbar input { padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; }
        .toolbar select:focus, .toolbar input:focus { border-color: #6c5ce7; }
        .btn { padding: 7px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .btn-primary { background: #6c5ce7; color: #fff; }
        .btn-primary:hover { background: #5a4bd1; }
        .btn-secondary { background: #dfe6e9; color: #333; }
        .btn-secondary:hover { background: #b2bec3; }
        .btn-lookup { padding: 2px 8px; font-size: 11px; background: #0984e3; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .btn-lookup:hover { background: #0773c5; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #fff; border-radius: 10px; padding: 14px 18px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-card .label { font-size: 12px; color: #999; }
        .stat-card .value { font-size: 24px; font-weight: 700; }
        .stat-card .hit { color: #00b894; }
        .stat-card .miss { color: #e17055; }
        .table-wrap { background: #fff; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 9px 12px; text-align: left; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
        th { background: #f8f9fa; font-weight: 600; color: #555; position: sticky; top: 0; white-space: nowrap; }
        tr:hover td { background: #f0f4ff; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
        .tag-hit { background: #d4fceb; color: #00b894; }
        .tag-miss { background: #ffe2dc; color: #e17055; }
        .query-text { font-family: 'Microsoft YaHei', sans-serif; max-width: 320px; word-break: break-all; }
        .mono { font-family: 'Consolas', monospace; font-size: 12px; }
        .code { font-family: 'Consolas', monospace; color: #0984e3; }
        .match-row { background: #f0f9ff; padding: 4px 8px; margin: 2px 0; border-radius: 4px; font-size: 12px; }
        .match-name { font-weight: 700; color: #2d3436; }
        .match-pos { color: #636e72; font-size: 11px; margin-left: 6px; }
        .no-match { color: #b2bec3; font-style: italic; font-size: 12px; }
        .loading { text-align: center; padding: 60px; color: #999; font-size: 16px; }
        .no-data { text-align: center; padding: 80px 20px; color: #999; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 16px; font-size: 13px; }
        .pagination button { padding: 6px 14px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; }
        .pagination button:hover { background: #f0f0f0; }
        .pagination button.active { background: #6c5ce7; color: #fff; border-color: #6c5ce7; }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        .text-highlight { background: #fef08a; padding: 1px 0; border-radius: 2px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; border-radius: 12px; padding: 24px; max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
        .modal h3 { margin-bottom: 12px; color: #2d3436; }
        .modal .close { float: right; background: none; border: none; font-size: 22px; cursor: pointer; color: #999; }
        .modal .result-item { padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Trie 扫描匹配结果验证</h1>
    <p class="subtitle">逐条查看短文本中匹配到的公司名、Code、下标，人工确认正确性</p>

    <div class="toolbar">
        <label>测试方案:</label>
        <select id="selTest" onchange="onFilter()"><option value="">全部</option></select>
        <label>操作:</label>
        <select id="selType" onchange="onFilter()"><option value="">全部</option><option value="SEARCH">SEARCH</option><option value="INSERT">INSERT</option><option value="DELETE">DELETE</option><option value="UPDATE">UPDATE</option></select>
        <label>命中:</label>
        <select id="selHit" onchange="onFilter()"><option value="">全部</option><option value="1">仅命中</option><option value="0">仅未命中</option></select>
        <label>文本:</label>
        <input type="text" id="txtSearch" placeholder="模糊搜索..." oninput="onFilter()" style="width:180px;">
        <button class="btn btn-secondary" onclick="loadData()">刷新</button>
        <span style="margin-left:auto;font-size:12px;color:#999;" id="spanInfo"></span>
    </div>

    <div id="statsArea" class="stats"></div>

    <div class="table-wrap">
        <table>
            <thead><tr>
                <th>#</th><th>测试方案</th><th>操作</th>
                <th>输入文本</th><th>反序</th><th>命中</th><th>匹配数</th>
                <th>匹配详情 (公司名 / Code / 下标)</th><th>耗时(ms)</th>
            </tr></thead>
            <tbody id="tableBody"><tr><td colspan="9" class="loading">加载中...</td></tr></tbody>
        </table>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="this.classList.remove('show')">
    <div class="modal" onclick="event.stopPropagation()">
        <button class="close" onclick="document.getElementById('modalOverlay').classList.remove('show')">&times;</button>
        <h3>DB 核对 — Code <span id="modalCode" class="code"></span></h3>
        <div id="modalContent"></div>
    </div>
</div>

<script>
    let allSamples = [];
    let currentPage = 1;
    const PAGE_SIZE = 30;

    async function loadData() {
        document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" class="loading">加载中...</td></tr>';
        try {
            const resp = await fetch('/api/verify');
            allSamples = await resp.json();
            if (!allSamples || allSamples.length === 0) {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" class="no-data"><h2>&#x1F4CB;</h2><p>暂无验证数据</p></td></tr>';
                document.getElementById('statsArea').innerHTML = '';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            const testNames = [...new Set(allSamples.map(s => s.testName))].sort();
            const sel = document.getElementById('selTest');
            sel.innerHTML = '<option value="">全部</option>';
            testNames.forEach(t => { sel.innerHTML += `<option value="${t}">${t}</option>`; });
            onFilter();
        } catch (e) {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" class="no-data"><p>加载失败: ' + e.message + '</p></td></tr>';
        }
    }

    function getFiltered() {
        const testName = document.getElementById('selTest').value;
        const type = document.getElementById('selType').value;
        const hit = document.getElementById('selHit').value;
        const search = document.getElementById('txtSearch').value.trim().toLowerCase();
        return allSamples.filter(s => {
            if (testName && s.testName !== testName) return false;
            if (type && s.type !== type) return false;
            if (hit === '1' && !s.hit) return false;
            if (hit === '0' && s.hit) return false;
            if (search && !s.queryText.toLowerCase().includes(search)) return false;
            return true;
        });
    }

    function onFilter() { currentPage = 1; render(); }

    function render() {
        const filtered = getFiltered();
        const totalPages = Math.ceil(filtered.length / PAGE_SIZE) || 1;
        if (currentPage > totalPages) currentPage = totalPages;
        const start = (currentPage - 1) * PAGE_SIZE;
        const page = filtered.slice(start, start + PAGE_SIZE);

        // Stats
        const total = filtered.length;
        const hits = filtered.filter(s => s.hit).length;
        const totalMatches = filtered.reduce((sum, s) => sum + (s.matchCount || 0), 0);
        const avgMs = total > 0 ? (filtered.reduce((sum, s) => sum + (s.durationMs || 0), 0) / total).toFixed(4) : 0;
        document.getElementById('statsArea').innerHTML = `
            <div class="stat-card"><div class="label">显示查询数</div><div class="value">${total.toLocaleString()}</div></div>
            <div class="stat-card"><div class="label">有匹配</div><div class="value hit">${hits.toLocaleString()}</div></div>
            <div class="stat-card"><div class="label">总匹配公司数</div><div class="value" style="color:#0984e3">${totalMatches.toLocaleString()}</div></div>
            <div class="stat-card"><div class="label">命中率</div><div class="value" style="color:#6c5ce7">${total > 0 ? (hits / total * 100).toFixed(1) : 0}%</div></div>
            <div class="stat-card"><div class="label">平均耗时</div><div class="value" style="color:#6c5ce7">${avgMs}</div><div style="font-size:11px;color:#999;">ms</div></div>`;

        // Table
        let html = '';
        page.forEach((s, i) => {
            const tagClass = s.hit ? 'tag-hit' : 'tag-miss';
            html += `<tr>
                <td class="mono">${start + i + 1}</td>
                <td style="font-size:12px;">${escHtml(s.testName)}</td>
                <td><span class="tag" style="background:#dfe6e9;color:#636e72;">${s.type}</span></td>
                <td class="query-text">${escHtml(s.queryText)}</td>
                <td style="font-size:11px;">${s.reversed ? '是' : '否'}</td>
                <td><span class="tag ${tagClass}">${s.hit ? 'HIT' : 'MISS'}</span></td>
                <td class="mono">${s.matchCount || 0}</td>
                <td>${renderMatches(s)}</td>
                <td class="mono">${(s.durationMs || 0).toFixed(4)}</td>
            </tr>`;
        });
        if (page.length === 0) html = '<tr><td colspan="9" style="text-align:center;padding:40px;color:#999;">无匹配记录</td></tr>';
        document.getElementById('tableBody').innerHTML = html;
        document.getElementById('spanInfo').textContent = `共 ${filtered.length.toLocaleString()} 条，第 ${currentPage}/${totalPages} 页`;

        // Pagination
        let pageHtml = `<button ${currentPage <= 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">上一页</button>`;
        const maxBtns = 7;
        let sp = Math.max(1, currentPage - Math.floor(maxBtns / 2));
        let ep = Math.min(totalPages, sp + maxBtns - 1);
        if (ep - sp < maxBtns - 1) sp = Math.max(1, ep - maxBtns + 1);
        for (let p = sp; p <= ep; p++) pageHtml += `<button class="${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
        pageHtml += `<button ${currentPage >= totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">下一页</button>`;
        document.getElementById('pagination').innerHTML = pageHtml;
    }

    function renderMatches(s) {
        if (!s.matches || s.matches.length === 0) return '<span class="no-match">无匹配</span>';
        return s.matches.map((m, idx) => 
            `<div class="match-row">
                <span class="match-name">${escHtml(m.matchedText)}</span>
                <span class="code">code=${m.companyCode}</span>
                <span class="match-pos">[${m.startIndex}, ${m.endIndex})</span>
                <button class="btn-lookup" onclick="lookupCode(${m.companyCode})">查DB</button>
            </div>`
        ).join('');
    }

    function goPage(p) { currentPage = p; render(); window.scrollTo({top: 0, behavior: 'smooth'}); }

    async function lookupCode(code) {
        const overlay = document.getElementById('modalOverlay');
        document.getElementById('modalCode').textContent = code;
        document.getElementById('modalContent').innerHTML = '<p style="padding:12px;color:#999;">查询中...</p>';
        overlay.classList.add('show');
        try {
            const resp = await fetch('/api/lookup?code=' + code);
            const data = await resp.json();
            if (data.found) {
                document.getElementById('modalContent').innerHTML = `
                    <p style="color:#00b894;font-weight:700;margin-bottom:8px;">DB 中存在此 Code</p>
                    <div class="result-item"><strong>公司名:</strong> ${escHtml(data.name)}</div>
                    <div class="result-item"><strong>Code:</strong> <span class="code">${data.code}</span></div>
                    <p style="margin-top:12px;font-size:12px;color:#636e72;">Trie 扫描匹配到的公司名子串应与此 DB 公司名一致。</p>`;
            } else {
                document.getElementById('modalContent').innerHTML = `
                    <p style="color:#e17055;font-weight:700;">DB 中未找到此 code</p>
                    <p style="font-size:12px;color:#636e72;">可能该 code 不在 7分区 数据范围内或已被 CRUD 修改。</p>`;
            }
        } catch (e) {
            document.getElementById('modalContent').innerHTML = '<p style="color:#e17055;">查询失败: ' + e.message + '</p>';
        }
    }

    function escHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
